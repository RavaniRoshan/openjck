name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[server]"

      - name: Run smoke test
        run: python examples/basic_agent.py

      - name: Verify trace files
        run: |
          if [ ! -d ~/.openjck/traces/ ] || [ -z "$(ls -A ~/.openjck/traces/)" ]; then
            echo "Trace files were not created in ~/.openjck/traces/!"
            exit 1
          fi
          echo "Trace files found:"
          ls -la ~/.openjck/traces/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .
