<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenJCK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --panel: #101117;
        --surface: #151823;
        --surface-2: #11131c;
        --border: rgba(255, 255, 255, 0.08);
        --muted: #8c92a8;
        --text: #f5f7fb;
        --accent: #7c6af7;
        --success: #3ecf8e;
        --error: #f5534f;
        --warning: #f5a623;
        --info: #4da6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(124, 106, 247, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(77, 166, 255, 0.08), transparent 24%),
          linear-gradient(180deg, #0f1015 0%, var(--bg) 100%);
        font-family: "JetBrains Mono", monospace;
      }

      body {
        overflow: hidden;
      }

      button {
        font: inherit;
        cursor: pointer;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        height: 100vh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: rgba(8, 9, 12, 0.92);
        border-right: 1px solid var(--border);
      }

      .side-top {
        padding: 24px 20px 18px;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: "Syne", sans-serif;
        font-size: 1.45rem;
      }

      .pulse {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 0 rgba(124, 106, 247, 0.65);
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(124, 106, 247, 0.65);
        }

        70% {
          box-shadow: 0 0 0 12px rgba(124, 106, 247, 0);
        }

        100% {
          box-shadow: 0 0 0 0 rgba(124, 106, 247, 0);
        }
      }

      .subtle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.6;
      }

      .side-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px 12px;
      }

      .label {
        font-size: 0.74rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .ghost {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
      }

      .trace-list {
        overflow: auto;
        padding: 0 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .trace-card {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        border-radius: 18px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
      }

      .trace-card.active {
        border-color: rgba(124, 106, 247, 0.5);
        background: linear-gradient(180deg, rgba(124, 106, 247, 0.14), rgba(255, 255, 255, 0.03));
      }

      .trace-name {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        line-height: 1.15;
      }

      .trace-row,
      .trace-foot {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 0.75rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
      }

      .completed {
        background: var(--success);
      }

      .failed {
        background: var(--error);
      }

      .running {
        background: var(--warning);
      }

      .unknown {
        background: var(--info);
      }

      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      .header,
      .timeline-shell,
      .detail-wrap {
        min-width: 0;
      }

      .header {
        padding: 28px 30px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(124, 106, 247, 0.08), transparent 60%);
      }

      .hero {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 18px;
      }

      .title {
        min-width: 0;
      }

      .title h1 {
        margin: 10px 0 0;
        font-family: "Syne", sans-serif;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 12px;
        width: min(100%, 560px);
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .stat small {
        display: block;
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 1.08rem;
      }

      .timeline-shell {
        padding: 18px 30px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .timeline-bar {
        display: flex;
        align-items: center;
        gap: 0;
        overflow-x: auto;
        padding: 18px 0 8px;
      }

      .step-link {
        position: relative;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        background: transparent;
        border: 0;
        padding: 0;
        color: inherit;
      }

      .step-link:not(:last-child)::after {
        content: "";
        width: 40px;
        height: 2px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
      }

      .node {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .node.llm_call {
        background: var(--accent);
      }

      .node.tool_call {
        background: var(--info);
      }

      .node.agent_step {
        background: var(--success);
      }

      .node.error {
        background: var(--error);
      }

      .node.active {
        transform: scale(1.24);
        box-shadow: 0 0 0 6px rgba(124, 106, 247, 0.2);
      }

      .node-label {
        position: absolute;
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.72rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .detail-wrap {
        overflow: auto;
        padding: 24px 30px 30px;
      }

      .card,
      .empty {
        min-height: 100%;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(124, 106, 247, 0.1), rgba(255, 255, 255, 0.03) 26%, rgba(255, 255, 255, 0.015));
      }

      .empty {
        display: grid;
        place-items: center;
        padding: 42px;
      }

      .empty-inner {
        max-width: 760px;
        width: 100%;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(124, 106, 247, 0.12);
        font-family: "Syne", sans-serif;
      }

      .empty h2 {
        margin: 18px 0 12px;
        font-family: "Syne", sans-serif;
        font-size: clamp(2.3rem, 5vw, 4.2rem);
        line-height: 0.94;
        letter-spacing: -0.04em;
      }

      .empty p {
        color: var(--muted);
        line-height: 1.7;
        max-width: 64ch;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .panel.wide {
        grid-column: 1 / -1;
      }

      .panel-head {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .code,
      .json {
        padding: 18px;
        line-height: 1.7;
      }

      .detail-head {
        padding: 24px 24px 12px;
        border-bottom: 1px solid var(--border);
      }

      .detail-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .detail-main {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .badge,
      .type,
      .metric {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
      }

      .badge,
      .type {
        padding: 7px 12px;
        font-size: 0.8rem;
      }

      .step-name-full {
        font-family: "Syne", sans-serif;
        font-size: 1.5rem;
      }

      .duration {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 16px 24px 0;
      }

      .metric {
        padding: 10px 14px;
      }

      .metric div:first-child {
        color: var(--muted);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .metric div:last-child {
        margin-top: 6px;
      }

      .detail-body {
        padding: 18px 24px 24px;
        display: grid;
        gap: 16px;
      }

      .error-panel {
        border-color: rgba(245, 83, 79, 0.34);
        background: rgba(245, 83, 79, 0.08);
      }

      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 0 24px 24px;
      }

      .nav-buttons {
        display: flex;
        gap: 10px;
      }

      .nav button {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .nav button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .json-key {
        color: var(--accent);
      }

      .json-string {
        color: var(--success);
      }

      .json-number {
        color: var(--info);
      }

      .json-boolean {
        color: var(--warning);
      }

      .json-null {
        color: var(--error);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1100px) {
        #app {
          grid-template-columns: 1fr;
          grid-template-rows: 320px minmax(0, 1fr);
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .stats,
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        body {
          overflow: auto;
        }

        #app {
          height: auto;
          min-height: 100vh;
        }

        .hero,
        .detail-title,
        .nav {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="side-top">
          <div class="brand"><span class="pulse"></span><span>◈ OpenJCK</span></div>
          <div class="subtle">Visual debugger for AI agent loops. Inspect every decision, every tool hop, every output.</div>
        </div>
        <div class="side-bar">
          <div class="label">Runs</div>
          <button id="refreshButton" class="ghost" type="button">Refresh</button>
        </div>
        <div id="traceList" class="trace-list"></div>
      </aside>
      <main class="main">
        <section id="header" class="header hidden"></section>
        <section id="timeline" class="timeline-shell hidden"></section>
        <section class="detail-wrap">
          <div id="content"></div>
        </section>
      </main>
    </div>
    <script>
      const state = { traces: [], selectedTrace: null, selectedStepId: null };

      const traceListEl = document.getElementById("traceList");
      const headerEl = document.getElementById("header");
      const timelineEl = document.getElementById("timeline");
      const contentEl = document.getElementById("content");
      document.getElementById("refreshButton").addEventListener("click", () => loadTraces());

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDuration(ms) {
        if (ms == null) return "—";
        return ms < 1000 ? Math.round(ms) + "ms" : (ms / 1000).toFixed(2) + "s";
      }

      function formatRelative(iso) {
        if (!iso) return "unknown";
        const diff = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
        if (diff < 60) return diff + "s ago";
        if (diff < 3600) return Math.round(diff / 60) + "m ago";
        if (diff < 86400) return Math.round(diff / 3600) + "h ago";
        return Math.round(diff / 86400) + "d ago";
      }

      function formatStamp(iso) {
        if (!iso) return "—";
        return new Date(iso).toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function statusClass(status) {
        return ["completed", "failed", "running"].includes(status) ? status : "unknown";
      }

      function stepClass(step) {
        if (step && step.error) return "error";
        return ["llm_call", "tool_call", "agent_step"].includes(step?.type) ? step.type : "unknown";
      }

      function formatJson(value) {
        const source = value === undefined ? "undefined" : JSON.stringify(value, null, 2);
        const safe = escapeHtml(source == null ? "null" : source);
        return safe.replace(
          /("(?:\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*")(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?/g,
          (match, stringToken, colon, keyword) => {
            if (stringToken) {
              return colon
                ? '<span class="json-key">' + stringToken + "</span>" + colon
                : '<span class="json-string">' + stringToken + "</span>";
            }
            if (keyword) {
              return keyword === "null"
                ? '<span class="json-null">' + keyword + "</span>"
                : '<span class="json-boolean">' + keyword + "</span>";
            }
            return '<span class="json-number">' + match + "</span>";
          },
        );
      }

      function renderEmpty() {
        headerEl.classList.add("hidden");
        timelineEl.classList.add("hidden");
        contentEl.innerHTML = `
          <section class="empty">
            <div class="empty-inner">
              <div class="pill"><span class="pulse"></span><span>◈ OpenJCK</span></div>
              <h2>Trace every loop.<br />Debug every turn.</h2>
              <p>
                Instrument your Python agent with three decorators, run it locally, and every trace shows up here
                automatically from <span style="color: var(--text);">~/.openjck/traces/</span>.
              </p>
              <div class="grid">
                <div class="panel">
                  <div class="panel-head">Install</div>
                  <pre class="code">pip install openjck</pre>
                </div>
                <div class="panel">
                  <div class="panel-head">Open Viewer</div>
                  <pre class="code">npx openjck</pre>
                </div>
                <div class="panel wide">
                  <div class="panel-head">Instrument your agent</div>
                  <pre class="code">from openjck import trace, trace_llm, trace_tool

@trace(name="my_agent")
def run_agent(task: str):
    ...

@trace_llm
def call_llm(messages):
    return ollama.chat(model="qwen2.5:7b", messages=messages)

@trace_tool
def web_search(query: str) -> str:
    ...</pre>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderTraceList() {
        if (state.traces.length === 0) {
          traceListEl.innerHTML = '<div class="subtle" style="padding: 8px 6px;">No traces yet. Run your agent to begin.</div>';
          return;
        }

        traceListEl.innerHTML = state.traces
          .map((trace) => {
            const active = state.selectedTrace && state.selectedTrace.trace_id === trace.trace_id ? "active" : "";
            return `
              <button class="trace-card ${active}" type="button" onclick="selectTrace('${encodeURIComponent(trace.trace_id)}')">
                <div class="trace-name">${escapeHtml(trace.run_name || "Unnamed run")}</div>
                <div class="trace-row">
                  <span class="status"><span class="dot ${statusClass(trace.status)}"></span>${escapeHtml(trace.status || "unknown")}</span>
                  <span>${trace.step_count || 0} steps</span>
                </div>
                <div class="trace-foot">
                  <span>${formatDuration(trace.total_duration_ms)}</span>
                  <span>${formatRelative(trace.started_at)}</span>
                </div>
              </button>
            `;
          })
          .join("");
      }

      function renderHeader() {
        if (!state.selectedTrace) {
          headerEl.classList.add("hidden");
          return;
        }

        const trace = state.selectedTrace;
        headerEl.classList.remove("hidden");
        headerEl.innerHTML = `
          <div class="hero">
            <div class="title">
              <div class="status"><span class="dot ${statusClass(trace.status)}"></span><span style="color: var(--muted);">${escapeHtml(trace.status || "unknown")}</span></div>
              <h1>${escapeHtml(trace.run_name || "Unnamed run")}</h1>
              <div class="meta">
                <span>Trace ID: ${escapeHtml(trace.trace_id || "—")}</span>
                <span>Started: ${escapeHtml(formatStamp(trace.started_at))}</span>
                <span>Finished: ${escapeHtml(formatStamp(trace.finished_at))}</span>
              </div>
            </div>
            <div class="stats">
              <div class="stat"><small>Steps</small><strong>${Array.isArray(trace.steps) ? trace.steps.length : 0}</strong></div>
              <div class="stat"><small>Duration</small><strong>${formatDuration(trace.total_duration_ms)}</strong></div>
              <div class="stat"><small>Tokens</small><strong>${Number(trace.total_tokens || 0).toLocaleString()}</strong></div>
              <div class="stat"><small>Cost</small><strong>${Number(trace.total_cost_usd || 0) > 0 ? "$" + Number(trace.total_cost_usd).toFixed(4) : "—"}</strong></div>
            </div>
          </div>
        `;
      }

      function renderTimeline() {
        if (!state.selectedTrace) {
          timelineEl.classList.add("hidden");
          return;
        }

        const steps = Array.isArray(state.selectedTrace.steps) ? state.selectedTrace.steps : [];
        const every = steps.length > 60 ? Math.ceil(steps.length / 60) : 1;
        const visible = steps.filter((_, index) => index % every === 0).slice(0, 60);

        timelineEl.classList.remove("hidden");
        timelineEl.innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;">
            <div class="label">Execution timeline</div>
            <div class="subtle" style="margin:0;">${visible.length} visible · ${steps.length} total step${steps.length === 1 ? "" : "s"}</div>
          </div>
          <div class="timeline-bar">
            ${visible
              .map((step) => {
                const active = String(step.step_id) === String(state.selectedStepId) ? "active" : "";
                return `
                  <button class="step-link" type="button" title="${escapeHtml(step.name || step.type || "step")}" onclick="selectStep(${JSON.stringify(step.step_id)})">
                    <span class="node ${stepClass(step)} ${active}"></span>
                    <span class="node-label">#${escapeHtml(step.step_id)}</span>
                  </button>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderDetail() {
        if (!state.selectedTrace) {
          renderEmpty();
          return;
        }

        const steps = Array.isArray(state.selectedTrace.steps) ? state.selectedTrace.steps : [];
        if (steps.length === 0) {
          contentEl.innerHTML = '<section class="card"><div class="detail-head"><div class="step-name-full">This trace has no recorded steps yet.</div></div></section>';
          return;
        }

        const selected = steps.find((step) => String(step.step_id) === String(state.selectedStepId)) || steps[0];
        state.selectedStepId = selected.step_id;
        const index = steps.findIndex((step) => String(step.step_id) === String(selected.step_id));
        const total = Number(selected.tokens_in || 0) + Number(selected.tokens_out || 0);

        contentEl.innerHTML = `
          <section class="card">
            <div class="detail-head">
              <div class="detail-title">
                <div class="detail-main">
                  <div class="badge">Step ${escapeHtml(selected.step_id)}</div>
                  <div class="step-name-full">${escapeHtml(selected.name || selected.type || "Unnamed step")}</div>
                  <div class="type">${escapeHtml(selected.type || "unknown")}</div>
                </div>
                <div class="duration">Duration: ${formatDuration(selected.duration_ms)}</div>
              </div>
            </div>
            <div class="metrics">
              <div class="metric"><div>Started</div><div>${escapeHtml(formatStamp(selected.started_at))}</div></div>
              <div class="metric"><div>Model</div><div>${escapeHtml(selected.model || "—")}</div></div>
              <div class="metric"><div>Tokens In</div><div>${Number(selected.tokens_in || 0).toLocaleString()}</div></div>
              <div class="metric"><div>Tokens Out</div><div>${Number(selected.tokens_out || 0).toLocaleString()}</div></div>
              <div class="metric"><div>Total</div><div>${total.toLocaleString()}</div></div>
            </div>
            <div class="detail-body">
              ${selected.error ? `<div class="panel error-panel"><div class="panel-head">Error</div><pre class="code">${escapeHtml(selected.error)}</pre></div>` : ""}
              <div class="grid" style="margin-top:0;">
                <div class="panel">
                  <div class="panel-head">Input</div>
                  <pre class="json">${formatJson(selected.input)}</pre>
                </div>
                <div class="panel">
                  <div class="panel-head">Output</div>
                  <pre class="json">${formatJson(selected.output)}</pre>
                </div>
              </div>
            </div>
            <div class="nav">
              <div class="nav-buttons">
                <button type="button" onclick="moveStep(-1)" ${index <= 0 ? "disabled" : ""}>Prev</button>
                <button type="button" onclick="moveStep(1)" ${index >= steps.length - 1 ? "disabled" : ""}>Next</button>
              </div>
              <div class="subtle" style="margin:0;">${index + 1} / ${steps.length}</div>
            </div>
          </section>
        `;
      }

      function renderAll() {
        renderTraceList();
        if (!state.selectedTrace) {
          renderEmpty();
          return;
        }
        renderHeader();
        renderTimeline();
        renderDetail();
      }

      async function fetchJson(path) {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error("Request failed: " + response.status);
        }
        return response.json();
      }

      async function loadTraces() {
        try {
          const traces = await fetchJson("/api/traces");
          state.traces = Array.isArray(traces) ? traces : [];

          if (state.selectedTrace) {
            const exists = state.traces.some((trace) => trace.trace_id === state.selectedTrace.trace_id);
            if (!exists) {
              state.selectedTrace = null;
              state.selectedStepId = null;
            }
          }

          const routeMatch = window.location.pathname.match(/^\/trace\/([^/]+)$/);
          const routedId = routeMatch ? decodeURIComponent(routeMatch[1]) : null;

          renderTraceList();

          if (routedId && (!state.selectedTrace || state.selectedTrace.trace_id !== routedId)) {
            await selectTrace(routedId, { pushRoute: false });
            return;
          }

          if (!state.selectedTrace && state.traces.length > 0 && !routedId) {
            await selectTrace(state.traces[0].trace_id, { pushRoute: false });
            return;
          }

          if (!state.selectedTrace) {
            renderEmpty();
          }
        } catch (error) {
          console.error(error);
          traceListEl.innerHTML = '<div class="subtle" style="padding: 8px 6px;">Unable to load traces right now.</div>';
          if (!state.selectedTrace) {
            renderEmpty();
          }
        }
      }

      async function selectTrace(traceId, options = {}) {
        const normalized = decodeURIComponent(traceId);
        try {
          const trace = await fetchJson("/api/traces/" + encodeURIComponent(normalized));
          state.selectedTrace = trace;
          state.selectedStepId = Array.isArray(trace.steps) && trace.steps.length > 0 ? trace.steps[0].step_id : null;

          if (options.pushRoute !== false) {
            history.replaceState({}, "", "/trace/" + encodeURIComponent(normalized));
          }

          renderAll();
        } catch (error) {
          console.error(error);
        }
      }

      function selectStep(stepId) {
        state.selectedStepId = stepId;
        renderTimeline();
        renderDetail();
      }

      function moveStep(direction) {
        if (!state.selectedTrace || !Array.isArray(state.selectedTrace.steps)) return;
        const steps = state.selectedTrace.steps;
        const index = steps.findIndex((step) => String(step.step_id) === String(state.selectedStepId));
        const next = steps[index + direction];
        if (next) selectStep(next.step_id);
      }

      window.loadTraces = loadTraces;
      window.selectTrace = selectTrace;
      window.selectStep = selectStep;
      window.moveStep = moveStep;

      renderEmpty();
      loadTraces();
      setInterval(loadTraces, 5000);
    </script>
  </body>
</html>
