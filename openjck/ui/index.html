<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenJCK — Visual Debugger</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --bg1: #111216;
      --bg2: #161821;
      --bg3: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af7;
      --green: #3ecf8e;
      --red: #f5534f;
      --yellow: #f5a623;
      --blue: #4da6ff;
      --text: #e8e8ef;
      --muted: #a2a7bd;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", "Menlo", monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */
    .sidebar {
      width: 280px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: white;
    }

    .search-box {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
    }

    .filter-pills {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg2);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .trace-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .trace-item {
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .trace-item:hover {
      background: var(--bg3);
      border-color: var(--accent);
    }

    .trace-item.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .trace-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .trace-name {
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.4rem;
    }

    .status-dot.completed {
      background: var(--green);
    }

    .status-dot.failed {
      background: var(--red);
    }

    .status-dot.running {
      background: var(--yellow);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .trace-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .trace-item.selected .trace-meta {
      color: rgba(255, 255, 255, 0.7);
    }

    .trace-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .btn-small {
      flex: 1;
      padding: 0.3rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.2s;
    }

    .btn-small:hover {
      background: var(--bg3);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Main Content ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg1);
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: white;
    }

    .header-stats {
      display: flex;
      gap: 2rem;
      font-size: 13px;
      color: var(--muted);
    }

    .stat {
      display: flex;
      gap: 0.4rem;
    }

    .stat-label {
      color: var(--muted);
    }

    .stat-value {
      color: var(--accent);
      font-weight: 600;
    }

    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .timeline-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .timeline {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .timeline-nodes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      padding: 0 1rem;
    }

    .timeline-node {
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .node-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .node-circle.llm_call {
      background: var(--accent);
    }

    .node-circle.tool_call {
      background: var(--green);
    }

    .node-circle.agent_step {
      background: var(--blue);
    }

    .node-circle.custom {
      background: var(--yellow);
    }

    .timeline-node:hover .node-circle {
      transform: scale(1.3);
      border-color: var(--accent);
    }

    .timeline-node.selected .node-circle {
      transform: scale(1.5);
      border-width: 3px;
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .node-label {
      flex: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-duration {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .detail-panel {
      width: 400px;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }

    .detail-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
    }

    .detail-step-num {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .detail-name {
      font-size: 16px;
      font-weight: 600;
      color: white;
      margin-bottom: 0.6rem;
    }

    .detail-badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--text);
    }

    .badge.type-llm_call {
      border-color: var(--accent);
      color: var(--accent);
    }

    .badge.type-tool_call {
      border-color: var(--green);
      color: var(--green);
    }

    .badge.type-agent_step {
      border-color: var(--blue);
      color: var(--blue);
    }

    .detail-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .detail-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .section-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    .code-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      font-size: 12px;
      overflow-x: auto;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 150px;
      overflow-y: auto;
    }

    .error-block {
      padding: 0.75rem;
      background: rgba(245, 83, 79, 0.1);
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .model-tag {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: rgba(124, 106, 247, 0.15);
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent);
      font-size: 11px;
      margin-top: 0.4rem;
    }

    .token-count {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      font-size: 12px;
    }

    .token-item {
      display: flex;
      gap: 0.4rem;
    }

    .token-label {
      color: var(--muted);
    }

    .token-value {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Navigation ────────────────────────────────────────────────── */
    .detail-nav {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Waterfall Chart ───────────────────────────────────────────── */
    .waterfall-section {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .waterfall-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      cursor: pointer;
    }

    .waterfall-title {
      font-weight: 600;
      color: var(--text);
    }

    .waterfall-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      transition: all 0.2s;
    }

    .waterfall-toggle.open {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .waterfall-content {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 0.8rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s;
    }

    .waterfall-content.open {
      max-height: 200px;
    }

    .waterfall-step {
      display: contents;
    }

    .waterfall-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .waterfall-bar {
      display: flex;
      height: 24px;
      gap: 2px;
      align-items: center;
    }

    .bar-in {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      display: flex;
      align-items: center;
      padding: 0 0.4rem;
      color: white;
      font-size: 10px;
      font-weight: 600;
    }

    .bar-out {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      display: flex;
      align-items: center;
      padding: 0 0.4rem;
      color: white;
      font-size: 10px;
      font-weight: 600;
    }

    /* ── Modal ─────────────────────────────────────────────────────── */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 1rem;
      color: white;
    }

    .keybindings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .keybindings-table td {
      padding: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .keybindings-table td:first-child {
      color: var(--accent);
      font-weight: 600;
      width: 100px;
    }

    .keybindings-table td:last-child {
      color: var(--muted);
    }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* ── Responsive ────────────────────────────────────────────────– */
    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .detail-panel { width: 300px; }
    }

    @media (max-width: 600px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; height: 200px; }
      .main { height: calc(100vh - 200px); }
      .detail-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .timeline-panel { border-right: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Traces</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Search runs..." />
        <div class="filter-pills">
          <button class="pill active" data-filter="all">All</button>
          <button class="pill" data-filter="completed">✓ Done</button>
          <button class="pill" data-filter="failed">✗ Failed</button>
        </div>
      </div>
      <div class="trace-list" id="traceList"></div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="header" id="header">
        <div class="header-title">Select a trace to view details</div>
      </div>

      <div class="content">
        <!-- Timeline Panel -->
        <div class="timeline-panel">
          <div class="timeline" id="timeline">
            <div class="detail-empty">No trace selected</div>
          </div>
        </div>

        <!-- Detail Panel -->
        <div class="detail-panel" id="detailPanel">
          <div class="detail-empty">Select a step to view details</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Keybindings Modal -->
  <div class="modal" id="keybindingsModal">
    <div class="modal-content">
      <div class="modal-title">⌨️ Keyboard Shortcuts</div>
      <table class="keybindings-table">
        <tr>
          <td>j / ↓</td>
          <td>Next step</td>
        </tr>
        <tr>
          <td>k / ↑</td>
          <td>Previous step</td>
        </tr>
        <tr>
          <td>g</td>
          <td>First step</td>
        </tr>
        <tr>
          <td>G</td>
          <td>Last step</td>
        </tr>
        <tr>
          <td>r</td>
          <td>Refresh traces</td>
        </tr>
        <tr>
          <td>Escape</td>
          <td>Deselect step</td>
        </tr>
        <tr>
          <td>?</td>
          <td>Show help</td>
        </tr>
      </table>
    </div>
  </div>

  <script>
    // State
    let traces = [];
    let currentTraceId = null;
    let currentStepId = null;
    let selectedFilter = "all";
    let comparingTraces = [];

    // Initialize on page load
    document.addEventListener("DOMContentLoaded", () => {
      loadTraces();
      setupEventListeners();
      setupKeyboardNavigation();
      // Auto-refresh every 5 seconds
      setInterval(loadTraces, 5000);
      // Load trace from URL if present
      const pathMatch = window.location.pathname.match(/\/trace\/([a-f0-9]+)/);
      if (pathMatch) {
        selectTrace(pathMatch[1]);
      }
    });

    function setupEventListeners() {
      // Search
      document.getElementById("searchInput").addEventListener("input", filterTraces);

      // Filter pills
      document.querySelectorAll(".pill").forEach(pill => {
        pill.addEventListener("click", (e) => {
          document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
          e.target.classList.add("active");
          selectedFilter = e.target.dataset.filter;
          filterTraces();
        });
      });
    }

    function setupKeyboardNavigation() {
      document.addEventListener("keydown", (e) => {
        // Don't trigger shortcuts if focus is on input or textarea
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") {
          return;
        }

        const steps = document.querySelectorAll(".timeline-node");
        const currentIndex = Array.from(steps).findIndex(s => s.classList.contains("selected"));

        switch (e.key.toLowerCase()) {
          case "j":
          case "arrowdown":
            e.preventDefault();
            if (currentIndex < steps.length - 1) {
              steps[currentIndex + 1].click();
            }
            break;
          case "k":
          case "arrowup":
            e.preventDefault();
            if (currentIndex > 0) {
              steps[currentIndex - 1].click();
            }
            break;
          case "g":
            e.preventDefault();
            if (steps.length > 0) {
              steps[0].click();
            }
            break;
          case "G":
            e.preventDefault();
            if (steps.length > 0) {
              steps[steps.length - 1].click();
            }
            break;
          case "r":
            e.preventDefault();
            loadTraces();
            break;
          case "escape":
            e.preventDefault();
            deselectStep();
            break;
          case "?":
            e.preventDefault();
            document.getElementById("keybindingsModal").classList.toggle("open");
            break;
        }
      });

      // Close modal on click outside
      document.getElementById("keybindingsModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) {
          e.currentTarget.classList.remove("open");
        }
      });
    }

    async function loadTraces() {
      try {
        const response = await fetch("/api/traces");
        traces = await response.json();
        renderTraceList();
      } catch (err) {
        console.error("Failed to load traces:", err);
      }
    }

    function filterTraces() {
      const searchQuery = document.getElementById("searchInput").value.toLowerCase();
      const filtered = traces.filter(t => {
        const matchesSearch = t.run_name.toLowerCase().includes(searchQuery);
        const matchesFilter = selectedFilter === "all" || t.status === selectedFilter;
        return matchesSearch && matchesFilter;
      });
      renderTraceList(filtered);
    }

    function renderTraceList(toRender = traces) {
      const list = document.getElementById("traceList");
      list.innerHTML = toRender.map(t => `
        <div class="trace-item ${t.trace_id === currentTraceId ? "selected" : ""}" onclick="selectTrace('${t.trace_id}')">
          <div class="trace-item-header">
            <span class="status-dot ${t.status}"></span>
            <span class="trace-name">${t.run_name}</span>
          </div>
          <div class="trace-meta">
            <span>${t.step_count} steps</span>
            <span>${formatTime(t.started_at)}</span>
          </div>
          ${t.total_cost_usd > 0 ? `<div class="trace-meta"><span>$${t.total_cost_usd.toFixed(4)}</span></div>` : ""}
          <div class="trace-actions">
            <button class="btn-small" onclick="selectTrace('${t.trace_id}', event)">View</button>
            <button class="btn-small" onclick="deleteTrace('${t.trace_id}', event)">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function selectTrace(traceId, event) {
      if (event) event.stopPropagation();
      currentTraceId = traceId;
      currentStepId = null;
      loadTraceDetails(traceId);
      window.history.pushState({}, "", `/trace/${traceId}`);
    }

    async function loadTraceDetails(traceId) {
      try {
        const response = await fetch(`/api/traces/${traceId}`);
        const trace = await response.json();
        renderHeader(trace);
        renderTimeline(trace);
        renderTraceList();
      } catch (err) {
        console.error("Failed to load trace:", err);
      }
    }

    function renderHeader(trace) {
      const header = document.getElementById("header");
      const duration = trace.total_duration_ms ? `${trace.total_duration_ms}ms` : "—";
      const totalTokens = (trace.total_tokens_in || 0) + (trace.total_tokens_out || 0);
      const cost = trace.total_cost_usd ? `$${trace.total_cost_usd.toFixed(4)}` : "$0.00";
      header.innerHTML = `
        <div class="header-title">${trace.run_name}</div>
        <div class="header-stats">
          <div class="stat">
            <span class="stat-label">Status:</span>
            <span class="stat-value">${trace.status}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Steps:</span>
            <span class="stat-value">${trace.steps.length}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Tokens:</span>
            <span class="stat-value">${totalTokens}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Cost:</span>
            <span class="stat-value">${cost}</span>
          </div>
          <div class="stat">
            <span class="stat-label">Duration:</span>
            <span class="stat-value">${duration}</span>
          </div>
        </div>
      `;
    }

    function renderTimeline(trace) {
      const timeline = document.getElementById("timeline");
      const nodes = trace.steps.map((step, idx) => `
        <div class="timeline-node ${currentStepId === step.step_id ? "selected" : ""}" onclick="selectStep(${step.step_id}, event)">
          <div class="node-circle ${step.type}"></div>
          <div class="node-label">${step.name}</div>
          <div class="node-duration">${step.duration_ms || 0}ms</div>
        </div>
      `).join("");

      timeline.innerHTML = `<div class="timeline-nodes">${nodes}</div>`;

      // Show waterfall if there are token counts
      if (trace.steps.some(s => s.tokens_in > 0 || s.tokens_out > 0)) {
        renderWaterfall(trace.steps);
      }
    }

    function renderWaterfall(steps) {
      const timeline = document.getElementById("timeline");
      const stepsWithTokens = steps.filter(s => s.tokens_in > 0 || s.tokens_out > 0);

      if (stepsWithTokens.length === 0) return;

      const maxTokens = Math.max(
        ...stepsWithTokens.flatMap(s => [s.tokens_in, s.tokens_out])
      );

      let waterfallHtml = `
        <div class="waterfall-section">
          <div class="waterfall-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.waterfall-toggle').classList.toggle('open')">
            <div class="waterfall-title">Token Waterfall</div>
            <div class="waterfall-toggle">▼</div>
          </div>
          <div class="waterfall-content">
      `;

      for (const step of stepsWithTokens) {
        const inPercent = (step.tokens_in / maxTokens) * 100;
        const outPercent = (step.tokens_out / maxTokens) * 100;

        waterfallHtml += `
          <div class="waterfall-step">
            <div class="waterfall-label">${step.name.substring(0, 10)}</div>
            <div class="waterfall-bar">
              ${step.tokens_in > 0 ? `<div class="bar-in" style="width: ${inPercent}%">${step.tokens_in}</div>` : ""}
              ${step.tokens_out > 0 ? `<div class="bar-out" style="width: ${outPercent}%">${step.tokens_out}</div>` : ""}
            </div>
          </div>
        `;
      }

      waterfallHtml += `
          </div>
        </div>
      `;

      timeline.insertAdjacentHTML("beforeend", waterfallHtml);
    }

    function selectStep(stepId, event) {
      if (event) event.stopPropagation();
      currentStepId = stepId;

      document.querySelectorAll(".timeline-node").forEach(node => {
        node.classList.remove("selected");
      });
      event.target.closest(".timeline-node").classList.add("selected");

      // Find step data
      const steps = document.querySelectorAll(".timeline-node");
      let stepIndex = 0;
      for (let i = 0; i < steps.length; i++) {
        if (steps[i].classList.contains("selected")) {
          stepIndex = i;
          break;
        }
      }

      const allSteps = document.querySelectorAll(".timeline-node");
      if (stepIndex < allSteps.length) {
        const step = Object.values(window.__traces || {}).flat()[stepIndex];
        if (step) {
          renderStepDetail(step, stepIndex + 1);
        }
      }

      // Get the trace data and find the step
      fetch(`/api/traces/${currentTraceId}`)
        .then(r => r.json())
        .then(trace => {
          const step = trace.steps[stepIndex];
          if (step) {
            renderStepDetail(step, stepIndex + 1);
          }
        });
    }

    function deselectStep() {
      currentStepId = null;
      document.querySelectorAll(".timeline-node").forEach(node => {
        node.classList.remove("selected");
      });
      document.getElementById("detailPanel").innerHTML = '<div class="detail-empty">Select a step to view details</div>';
    }

    function renderStepDetail(step, stepNum) {
      const panel = document.getElementById("detailPanel");
      let html = `
        <div class="detail-content">
          <div class="detail-header">
            <div class="detail-step-num">Step ${stepNum}</div>
            <div class="detail-name">${step.name}</div>
            <div class="detail-badges">
              <span class="badge type-${step.type}">${step.type.replace(/_/g, " ")}</span>
              ${step.duration_ms ? `<span class="badge">${step.duration_ms}ms</span>` : ""}
              ${step.model ? `<span class="badge">${step.model}</span>` : ""}
            </div>
          </div>
          <div class="detail-body">
      `;

      if (step.input) {
        html += `
          <div class="detail-section">
            <div class="section-label">Input</div>
            <div class="code-block">${JSON.stringify(step.input, null, 2)}</div>
          </div>
        `;
      }

      if (step.output && !step.error) {
        html += `
          <div class="detail-section">
            <div class="section-label">Output</div>
            <div class="code-block">${JSON.stringify(step.output, null, 2)}</div>
          </div>
        `;
      }

      if (step.error) {
        html += `
          <div class="detail-section">
            <div class="section-label">Error</div>
            <div class="error-block">${step.error}</div>
          </div>
        `;
      }

      if (step.tokens_in > 0 || step.tokens_out > 0) {
        html += `
          <div class="detail-section">
            <div class="section-label">Token Usage</div>
            <div class="token-count">
              <div class="token-item">
                <span class="token-label">Input:</span>
                <span class="token-value">${step.tokens_in}</span>
              </div>
              <div class="token-item">
                <span class="token-label">Output:</span>
                <span class="token-value">${step.tokens_out}</span>
              </div>
              ${step.cost_usd ? `
                <div class="token-item">
                  <span class="token-label">Cost:</span>
                  <span class="token-value">$${step.cost_usd.toFixed(6)}</span>
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }

      html += `
          </div>
        </div>
      `;

      panel.innerHTML = html;
    }

    async function deleteTrace(traceId, event) {
      if (event) event.stopPropagation();
      if (!confirm("Delete this trace?")) return;

      try {
        await fetch(`/api/traces/${traceId}`, { method: "DELETE" });
        loadTraces();
        if (currentTraceId === traceId) {
          currentTraceId = null;
          currentStepId = null;
          document.getElementById("header").innerHTML = '<div class="header-title">Select a trace to view details</div>';
          document.getElementById("timeline").innerHTML = '<div class="detail-empty">No trace selected</div>';
          document.getElementById("detailPanel").innerHTML = '<div class="detail-empty">Select a step to view details</div>';
        }
      } catch (err) {
        console.error("Failed to delete trace:", err);
      }
    }

    function formatTime(iso) {
      const date = new Date(iso);
      const now = new Date();
      const diff = now - date;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      return `${days}d ago`;
    }

    // Export functions globally
    window.loadTraces = loadTraces;
    window.selectTrace = selectTrace;
    window.selectStep = selectStep;
    window.deselectStep = deselectStep;
    window.deleteTrace = deleteTrace;
  </script>
</body>
</html>
